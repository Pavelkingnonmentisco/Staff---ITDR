<!DOCTYPE html>
<html>
<head>
<title>LS Staff Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Dashboard Staff</h1>

<div class="card-container">

<div class="card">
<h3>Staff Totale</h3>
<p id="staff">0</p>
</div>

<div class="card">
<h3>Sessioni Totali</h3>
<p id="sessions">0</p>
</div>

<div class="card">
<h3>Ore Totali</h3>
<p id="hours">0</p>
</div>

</div>

<div class="service">

<h2>Firma Servizio</h2>

<button onclick="start()">Firma Entrata</button>
<button onclick="stop()">Firma Uscita</button>

</div>

<script src="script.js"></script>

</body>
</html>
